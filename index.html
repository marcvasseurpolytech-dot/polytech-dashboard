<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashbord — Polytech Lille</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B1E3A;
    --navy-deep:#071527;
    --navy-line: rgba(245,241,230,0.14);
    --gold:#C9A24B;
    --gold-bright:#E4C878;
    --gold-glow: rgba(228,200,120,0.55);
    --cream:#F5F1E6;
    --cream-dim: rgba(245,241,230,0.62);
    --cream-faint: rgba(245,241,230,0.38);
    --ok:#7FA37A;
    --priv:#B57A5A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 15% -10%, rgba(201,162,75,0.10), transparent 45%),
      var(--navy);
    color:var(--cream);
    font-family:'Source Serif 4', serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--gold);color:var(--navy-deep);}
  a{color:inherit;text-decoration:none;}

  /* ===== LOCK SCREEN ===== */
  #lock{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .lock-box{
    width:100%;
    max-width:380px;
    text-align:center;
    padding:48px 36px;
    border:1px solid var(--navy-line);
    background:linear-gradient(180deg, rgba(245,241,230,0.03), transparent);
    position:relative;
  }
  .lock-box::before{
    content:"";
    position:absolute;inset:0;
    border:1px solid transparent;
    box-shadow:0 0 0 1px rgba(228,200,120,0.15), 0 0 40px rgba(228,200,120,0.10);
    pointer-events:none;
  }
  .lock-icon{
    width:34px;height:34px;
    margin:0 auto 22px;
    color:var(--gold);
  }
  .lock-box .eyebrow{margin-bottom:10px;}
  .lock-box h2{
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-size:22px;
    margin:0 0 8px;
    color:var(--cream);
  }
  .lock-box p{
    font-size:13.5px;
    color:var(--cream-dim);
    margin:0 0 26px;
    line-height:1.6;
  }
  .lock-form{display:flex;gap:8px;}
  #code-input{
    flex:1;
    background:transparent;
    border:1px solid var(--navy-line);
    color:var(--cream);
    font-family:'JetBrains Mono', monospace;
    letter-spacing:0.3em;
    text-align:center;
    font-size:16px;
    padding:12px 10px;
    outline:none;
  }
  #code-input:focus{border-color:var(--gold);box-shadow:0 0 12px rgba(228,200,120,0.25);}
  .lock-form button{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:0 20px;
    border:1px solid var(--gold);
    background:var(--gold);
    color:var(--navy-deep);
    font-weight:600;
    cursor:pointer;
  }
  .lock-form button:hover{background:var(--gold-bright);}
  .lock-error{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--priv);
    margin-top:14px;
    min-height:14px;
  }

  /* ===== DASHBOARD ===== */
  .wrap{max-width:1180px;margin:0 auto;padding:64px 32px 100px;}

  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:24px;
    border-bottom:1px solid var(--navy-line);
    padding-bottom:28px;
    margin-bottom:40px;
    flex-wrap:wrap;
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--gold);
    margin:0 0 14px;
  }
  h1{
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-size:clamp(32px, 4.2vw, 52px);
    line-height:1.05;
    margin:0;
    color:var(--cream);
    letter-spacing:-0.01em;
  }
  h1 em{font-style:italic;color:var(--gold-bright);font-weight:600;}
  .header-meta{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--cream-faint);
    text-align:right;
    line-height:1.8;
    white-space:nowrap;
  }
  .header-meta strong{color:var(--gold);font-weight:500;}

  .stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    border:1px solid var(--navy-line);
    margin-bottom:48px;
  }
  .stat{padding:20px 22px;border-right:1px solid var(--navy-line);}
  .stat:last-child{border-right:none;}
  .stat .n{
    font-family:'Playfair Display', serif;
    font-size:32px;font-weight:700;
    color:var(--gold-bright);line-height:1;
  }
  .stat .l{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;letter-spacing:0.14em;text-transform:uppercase;
    color:var(--cream-faint);margin-top:8px;
  }

  .controls{
    display:flex;gap:14px;align-items:center;margin-bottom:36px;flex-wrap:wrap;
  }
  .search{
    flex:1;min-width:220px;background:transparent;
    border:1px solid var(--navy-line);color:var(--cream);
    font-family:'JetBrains Mono', monospace;font-size:13px;
    padding:12px 16px;outline:none;transition:border-color .15s ease, box-shadow .15s ease;
  }
  .search::placeholder{color:var(--cream-faint);}
  .search:focus{border-color:var(--gold);box-shadow:0 0 14px rgba(228,200,120,0.18);}

  .section-title{display:flex;align-items:baseline;gap:14px;margin:52px 0 22px;}
  .section-title h2{
    font-family:'Playfair Display', serif;font-weight:600;font-style:italic;
    font-size:22px;color:var(--gold-bright);margin:0;white-space:nowrap;
  }
  .section-title .rule{flex:1;height:1px;background:var(--navy-line);}
  .section-title .count{font-family:'JetBrains Mono', monospace;font-size:11px;color:var(--cream-faint);}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
    gap:22px;
  }

  /* Luminous card frame */
  .card{
    position:relative;
    display:block;
    padding:26px 24px;
    background:linear-gradient(180deg, rgba(245,241,230,0.025), rgba(245,241,230,0.005));
    border:1px solid var(--navy-line);
    cursor:pointer;
    overflow:hidden;
    transition:border-color .25s ease, transform .2s ease, box-shadow .25s ease;
  }
  .card::before{
    content:"";
    position:absolute;
    top:-40%;left:-20%;
    width:60%;height:180%;
    background:linear-gradient(120deg, transparent, rgba(228,200,120,0.16), transparent);
    transform:rotate(20deg) translateX(-120%);
    transition:transform .7s ease;
    pointer-events:none;
  }
  .card:hover{
    border-color:var(--gold);
    box-shadow:0 0 0 1px rgba(228,200,120,0.35), 0 0 30px rgba(228,200,120,0.16), inset 0 0 24px rgba(228,200,120,0.04);
    transform:translateY(-2px);
  }
  .card:hover::before{transform:rotate(20deg) translateX(60%);}
  .card:focus-visible{outline:2px solid var(--gold-bright);outline-offset:3px;}

  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px;}
  .card h3{
    font-family:'Playfair Display', serif;font-size:18.5px;font-weight:600;
    margin:0;color:var(--cream);line-height:1.3;
  }
  .status-dot{
    flex-shrink:0;width:7px;height:7px;border-radius:50%;margin-top:7px;
    background:var(--ok);box-shadow:0 0 6px var(--ok);
  }
  .status-dot.priv{background:var(--priv);box-shadow:0 0 6px var(--priv);}

  .card p.desc{font-size:13.5px;color:var(--cream-dim);line-height:1.55;margin:0 0 18px;}

  .meta{
    font-family:'JetBrains Mono', monospace;font-size:10.5px;color:var(--cream-faint);
    letter-spacing:0.03em;display:flex;gap:10px;flex-wrap:wrap;
    padding-top:14px;border-top:1px solid var(--navy-line);
  }
  .tag{border:1px solid var(--navy-line);padding:2px 7px;}
  .tag.priv{color:var(--priv);border-color:rgba(181,122,90,0.4);}
  .tag.pub{color:var(--ok);border-color:rgba(127,163,122,0.4);}

  footer{
    margin-top:70px;padding-top:24px;border-top:1px solid var(--navy-line);
    font-family:'JetBrains Mono', monospace;font-size:11px;color:var(--cream-faint);
    display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;
  }

  @media (max-width:640px){
    .wrap{padding:40px 18px 70px;}
    header{flex-direction:column;align-items:flex-start;}
    .header-meta{text-align:left;}
    .stats{grid-template-columns:repeat(2,1fr);}
    .stat:nth-child(2){border-right:none;}
  }
  @media (prefers-reduced-motion: reduce){*{transition:none !important;}}
</style>
</head>
<body>

<div id="lock">
  <div class="lock-box">
    <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="5" y="11" width="14" height="10" rx="1"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
    <p class="eyebrow">Accès restreint</p>
    <h2>Dashbord</h2>
    <p>Ce tableau de bord est réservé. Saisissez le code d'accès.</p>
    <form class="lock-form" id="lock-form" autocomplete="off">
      <input id="code-input" type="password" inputmode="numeric" maxlength="12" placeholder="••••">
      <button type="submit">Entrer</button>
    </form>
    <div class="lock-error" id="lock-error"></div>
  </div>
</div>

<div class="wrap hidden" id="dashboard">

  <header>
    <div>
      <p class="eyebrow">Polytech Lille · Département Langues</p>
      <h1>Dash<em>bord</em></h1>
    </div>
    <div class="header-meta">
      <div><strong id="proj-count">—</strong> outils actifs</div>
      <div id="last-updated">Mis à jour —</div>
    </div>
  </header>

  <div class="stats">
    <div class="stat"><div class="n" id="s-total">—</div><div class="l">Outils au total</div></div>
    <div class="stat"><div class="n" id="s-pub">—</div><div class="l">Publics</div></div>
    <div class="stat"><div class="n" id="s-priv">—</div><div class="l">Privés</div></div>
    <div class="stat"><div class="n" id="s-vercel">—</div><div class="l">Déployés sur Vercel</div></div>
  </div>

  <div class="controls">
    <input class="search" id="search" type="text" placeholder="Rechercher un outil… (ex. jury, forms, correction)">
  </div>

  <div id="sections"></div>

  <footer>
    <span>Polytech Lille — usage interne</span>
    <span id="footer-date"></span>
  </footer>
</div>

<script>
const ACCESS_CODE = "3110";

function checkAccess(){
  const hash = window.location.hash.replace('#','');
  if(hash === ACCESS_CODE){
    document.getElementById('lock').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    return true;
  }
  return false;
}

document.getElementById('lock-form').addEventListener('submit', function(e){
  e.preventDefault();
  const val = document.getElementById('code-input').value.trim();
  if(val === ACCESS_CODE){
    window.location.hash = val;
    checkAccess();
  } else {
    document.getElementById('lock-error').textContent = "Code incorrect.";
    document.getElementById('code-input').value = '';
  }
});

window.addEventListener('hashchange', checkAccess);

const projects = [
  {name:"Jury École — Langues", desc:"Planification des jurys de fin d'année : onglets Planning, Étudiants, Synthèse, export PDF/XLS.", cat:"admin", updated:"2026-07-03", priv:false, live:"https://jury-ecole.vercel.app"},
  {name:"KwikTOEIC", desc:"Correction d'examens TOEIC par CSV, clés de correction pour 12 sessions, exports ZG 0/1, ZG EP, OMR.", cat:"admin", updated:"2026-07-03", priv:true, live:"https://toeic-vision-api.vercel.app"},
  {name:"Calendrier TOEIC", desc:"Page d'information des sessions TOEIC officielles, panneau admin protégé.", cat:"admin", updated:"2026-07-02", priv:false, live:"https://toeic-dates.vercel.app"},
  {name:"TOEIC Officiel", desc:"Gestion et présentation animée des scores TOEIC officiels, projetable en salle d'examen.", cat:"admin", updated:"2026-07-01", priv:false, live:"https://toeic-officiel.vercel.app"},
  {name:"Surveillance TOEIC", desc:"Suivi des sessions et affectations de surveillants sur plusieurs amphithéâtres.", cat:"admin", updated:"2026-06-30", priv:true, live:"https://toeic-surveillance.vercel.app"},
  {name:"TOEIC Forms Hub", desc:"Hub d'envoi d'exercices Google Forms, suivi par groupe, envoi WhatsApp, tableau de bord.", cat:"admin", updated:"2026-06-29", priv:true, live:"https://toeic-forms-hub.vercel.app"},
  {name:"Polytech Admin", desc:"Suivi académique : présences, scores TOEIC, contrôles continus.", cat:"admin", updated:"2026-06-24", priv:true, live:"https://polytech-admin.vercel.app"},
  {name:"TOEIC Correction", desc:"Application de correction d'examens TOEIC à partir des feuilles de réponses.", cat:"admin", updated:"2026-06-09", priv:false, live:"https://toeic-correction.vercel.app"},
  {name:"TOEIC Groups Manager", desc:"Formation de groupes par niveau et affectation des enseignants — v2.0.", cat:"admin", updated:"2026-07-03", priv:false, live:"https://toeic-groups-manager.vercel.app"},
  {name:"Bornes Polytech", desc:"Tableau de bord des bornes de recharge du parking Polytech.", cat:"autre", updated:"2026-06-05", priv:false, live:"https://bornes-polytech.vercel.app"},
];

const sectionLabels = {admin:"Outils administratifs", autre:"Autres outils"};
const order = ["admin","autre"];

function fmtDate(d){
  const dt = new Date(d+"T00:00:00");
  return dt.toLocaleDateString('fr-FR', {day:'2-digit', month:'short', year:'numeric'});
}

function renderStats(){
  document.getElementById('s-total').textContent = projects.length;
  document.getElementById('s-pub').textContent = projects.filter(p=>!p.priv).length;
  document.getElementById('s-priv').textContent = projects.filter(p=>p.priv).length;
  document.getElementById('s-vercel').textContent = projects.length;
  document.getElementById('proj-count').textContent = projects.length;
}

function render(query){
  const container = document.getElementById('sections');
  container.innerHTML = "";
  const q = query.trim().toLowerCase();

  order.forEach(cat=>{
    const items = projects.filter(p=>{
      const matchQ = !q || p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q);
      return p.cat===cat && matchQ;
    });
    if(items.length===0) return;

    const section = document.createElement('div');
    const title = document.createElement('div');
    title.className = 'section-title';
    title.innerHTML = `<h2>${sectionLabels[cat]}</h2><div class="rule"></div><span class="count">${items.length}</span>`;
    section.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'grid';
    items.forEach(p=>{
      const card = document.createElement('a');
      card.className = 'card';
      card.href = p.live;
      card.target = '_blank';
      card.rel = 'noopener';
      card.innerHTML = `
        <div class="card-top">
          <h3>${p.name}</h3>
          <span class="status-dot ${p.priv?'priv':''}" title="${p.priv?'Accès restreint':'Accès libre'}"></span>
        </div>
        <p class="desc">${p.desc}</p>
        <div class="meta">
          <span class="tag ${p.priv?'priv':'pub'}">${p.priv?'Restreint':'Public'}</span>
          <span>MAJ ${fmtDate(p.updated)}</span>
        </div>
      `;
      grid.appendChild(card);
    });
    section.appendChild(grid);
    container.appendChild(section);
  });

  if(container.innerHTML === ""){
    container.innerHTML = `<p style="font-family:'JetBrains Mono',monospace;color:var(--cream-faint);font-size:13px;padding:40px 0;">Aucun outil ne correspond à cette recherche.</p>`;
  }
}

document.getElementById('search').addEventListener('input', (e)=> render(e.target.value));

renderStats();
render('');
const now = new Date().toLocaleDateString('fr-FR', {day:'2-digit', month:'long', year:'numeric'});
document.getElementById('last-updated').textContent = 'Mis à jour ' + now;
document.getElementById('footer-date').textContent = now;

checkAccess();
</script>
</body>
</html>
